services:
  browserlab-proxy:
    image: ubuntu/squid:latest@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    ports:
      - "127.0.0.1:3128:3128"
    volumes:
      - ../workers/browser-lab/squid.conf:/etc/squid/squid.conf:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  browserlab-playwright:
    image: mcr.microsoft.com/playwright:v1.41.1-jammy@sha256:0f0547cc1492898e84a6fd0847bcfdde15e483b333a66e88b547c9ce15aea6c7
    depends_on:
      - browserlab-proxy
    environment:
      HTTP_PROXY: http://browserlab-proxy:3128
      HTTPS_PROXY: http://browserlab-proxy:3128
      NO_PROXY: localhost,127.0.0.1,browserlab-proxy
    command: ["bash", "-lc", "sleep infinity"]
    shm_size: "1gb"
    ports:
      - "127.0.0.1:9222:9222"
    volumes:
      - ${STRONGCLAW_COMPOSE_STATE_DIR:?Set STRONGCLAW_COMPOSE_STATE_DIR or use scripts/bootstrap/bootstrap_browser_lab.sh}/browser-lab:/workspace/state
      - ../workers/browser-lab:/workspace/browser-lab:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
