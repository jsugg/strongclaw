receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  attributes/scrub:
    actions:
      - key: user.full_name
        action: delete
      - key: user.email
        action: hash
      - key: http.request.header.authorization
        action: delete
      - key: http.response.header.set-cookie
        action: delete

  transform/redact:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - replace_all_patterns(attributes, "value", "sk-[A-Za-z0-9_-]+", "[REDACTED_OPENAI_KEY]")
          - replace_all_patterns(attributes, "value", "ghp_[A-Za-z0-9]+", "[REDACTED_GITHUB_TOKEN]")
          - replace_all_patterns(attributes, "value", "xox[baprs]-[A-Za-z0-9-]+", "[REDACTED_SLACK_TOKEN]")
    log_statements:
      - context: log
        statements:
          - replace_all_patterns(attributes, "value", "sk-[A-Za-z0-9_-]+", "[REDACTED_OPENAI_KEY]")
          - replace_all_patterns(attributes, "value", "ghp_[A-Za-z0-9]+", "[REDACTED_GITHUB_TOKEN]")

  batch:
    send_batch_size: 1024
    timeout: 10s

exporters:
  debug:
    verbosity: basic

  prometheus:
    endpoint: 0.0.0.0:9464

  otlphttp/langfuse:
    endpoint: ${LANGFUSE_OTEL_ENDPOINT}
    headers:
      Authorization: ${LANGFUSE_OTEL_BASIC_AUTH}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/scrub, transform/redact, batch]
      exporters: [debug, otlphttp/langfuse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, prometheus]
