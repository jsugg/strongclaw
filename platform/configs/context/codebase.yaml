index:
  db_path: .clawops/context.sqlite
  symlink_policy: in_repo_only

paths:
  include:
    - "**/*.md"
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.toml"
  exclude:
    - ".git/**"
    - "node_modules/**"
    - ".venv/**"
    - "dist/**"
    - "build/**"
    - ".openclaw/**"
    - "platform/plugins/memory-lancedb-pro/**"
