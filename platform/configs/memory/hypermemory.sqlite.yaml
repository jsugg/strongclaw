storage:
  db_path: .openclaw/hypermemory.sqlite

workspace:
  root: ../../../
  include_default_memory: true
  memory_file_names:
    - MEMORY.md
    - memory.md
  daily_dir: memory
  bank_dir: bank

corpus:
  paths:
    - name: runbooks
      path: ../../../platform/docs
      pattern: "**/*.md"
      required: true
    - name: skills
      path: ../../../platform/skills
      pattern: "**/*.md"
      required: true
    - name: openclaw-workspaces
      path: ../../../platform/workspace
      pattern: "**/*.md"
      required: true
    - name: openclaw-upstream
      path: ../../../repo/upstream
      pattern: "**/*.md"
    - name: repo-root-markdown
      path: ../../../
      pattern: "*.md"
      required: true

limits:
  max_snippet_chars: 400
  default_max_results: 8

backend:
  active: sqlite_fts
  fallback: sqlite_fts

embedding:
  enabled: false
  provider: disabled
  model: ""
  base_url: ""
  batch_size: 32
  timeout_ms: 15000

rerank:
  enabled: true
  provider: local-sentence-transformers
  fallback_provider: compatible-http
  fail_open: true
  normalize_scores: true
  local:
    model: BAAI/bge-reranker-v2-m3
    batch_size: 8
    max_length: 2048
  compatible_http:
    model: os.environ/HYPERMEMORY_RERANK_MODEL
    base_url: os.environ/HYPERMEMORY_RERANK_BASE_URL
    api_key_env: HYPERMEMORY_RERANK_API_KEY
    timeout_ms: 15000

hybrid:
  dense_candidate_pool: 24
  sparse_candidate_pool: 24
  vector_weight: 0.65
  text_weight: 0.35
  fusion: rrf
  rrf_k: 60
  rerank_candidate_pool: 32

qdrant:
  enabled: false
  url: http://127.0.0.1:6333
  collection: strongclaw-hypermemory
  timeout_ms: 3000

injection:
  max_results: 3
  max_chars_per_result: 280

governance:
  default_scope: project:strongclaw
  readable_scopes:
    - "project:"
    - "agent:"
    - "user:"
    - "global"
  writable_scopes:
    - "project:"
    - "agent:"
  auto_apply_scopes:
    - "project:"
    - "agent:"

ranking:
  memory_lane_weight: 1.0
  corpus_lane_weight: 1.0
  lexical_weight: 0.75
  coverage_weight: 0.35
  confidence_weight: 0.15
  recency_weight: 0.1
  contradiction_penalty: 0.2
  diversity_penalty: 0.35
  recency_half_life_days: 45
  rerank_weight: 0.35
