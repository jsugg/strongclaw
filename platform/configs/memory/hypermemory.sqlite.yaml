storage:
  db_path: .openclaw/hypermemory.sqlite

workspace:
  root: ../../../
  include_default_memory: true
  memory_file_names:
    - MEMORY.md
    - memory.md
  daily_dir: memory
  bank_dir: bank

corpus:
  paths:
    - name: runbooks
      path: ../../../platform/docs
      pattern: "**/*.md"
      required: true
    - name: skills
      path: ../../../platform/skills
      pattern: "**/*.md"
      required: true
    - name: openclaw-workspaces
      path: ../../../platform/workspace
      pattern: "**/*.md"
      required: true
    - name: openclaw-upstream
      path: ../../../repo/upstream
      pattern: "**/*.md"
    - name: repo-root-markdown
      path: ../../../
      pattern: "*.md"
      required: true

limits:
  max_snippet_chars: 400
  default_max_results: 8

backend:
  active: sqlite_fts
  fallback: sqlite_fts

embedding:
  enabled: false
  provider: disabled
  model: ""
  base_url: ""
  batch_size: 32
  timeout_ms: 15000

rerank:
  enabled: true
  provider: local-sentence-transformers
  fallback_provider: compatible-http
  fail_open: true
  normalize_scores: true
  local:
    model: BAAI/bge-reranker-v2-m3
    batch_size: 8
    max_length: 2048
    device: auto
  compatible_http:
    model: os.environ/HYPERMEMORY_RERANK_MODEL
    base_url: os.environ/HYPERMEMORY_RERANK_BASE_URL
    api_key_env: HYPERMEMORY_RERANK_API_KEY
    timeout_ms: 15000

hybrid:
  dense_candidate_pool: 24
  sparse_candidate_pool: 24
  vector_weight: 0.65
  text_weight: 0.35
  fusion: rrf
  rrf_k: 60
  rerank_candidate_pool: 32

qdrant:
  enabled: false
  url: http://127.0.0.1:6333
  collection: strongclaw-hypermemory
  timeout_ms: 3000

injection:
  max_results: 3
  max_chars_per_result: 280

dedup:
  enabled: true
  similarity_threshold: 0.92
  check_cross_scope: false
  typed_slots_enabled: true
  llm_assisted_enabled: false
  llm_near_threshold: 0.85

capture:
  enabled: false
  mode: llm
  incremental: true
  min_message_length: 20
  max_candidates_per_session: 10
  batch_size: 6
  batch_overlap: 2
  llm:
    endpoint: ""
    model: ""
    api_key_env: ""
    timeout_ms: 15000

decay:
  enabled: false
  half_life_days: 45
  recency_weight: 0.4
  frequency_weight: 0.3
  intrinsic_weight: 0.3
  beta_core: 0.8
  beta_working: 1.0
  beta_peripheral: 1.3
  promote_to_core_access: 10
  promote_to_core_composite: 0.7
  promote_to_core_importance: 0.8
  promote_to_working_access: 3
  promote_to_working_composite: 0.4
  demote_to_peripheral_composite: 0.15
  demote_to_peripheral_age_days: 60
  demote_to_peripheral_access: 3
  demote_from_core_composite: 0.15
  demote_from_core_access: 3

noise:
  enabled: true
  min_text_length: 10
  max_text_length: 2000

admission:
  enabled: false
  min_confidence: 0.3
  type_priors:
    fact: 0.85
    entity: 0.80
    opinion: 0.70
    reflection: 0.75

fact_registry:
  enabled: true
  auto_infer_keys: true

feedback:
  enabled: false
  reward_weight: 0.15
  penalty_weight: 0.2
  suppress_threshold: 3
  suppress_penalty: 0.5

retrieval:
  adaptive_pool: false
  adaptive_pool_max_multiplier: 4

governance:
  default_scope: project:strongclaw
  readable_scopes:
    - "project:"
    - "agent:"
    - "user:"
    - "global"
  writable_scopes:
    - "project:"
    - "agent:"
  auto_apply_scopes:
    - "project:"
    - "agent:"

ranking:
  memory_lane_weight: 1.0
  corpus_lane_weight: 1.0
  lexical_weight: 0.75
  coverage_weight: 0.35
  confidence_weight: 0.15
  recency_weight: 0.1
  contradiction_penalty: 0.2
  diversity_penalty: 0.35
  recency_half_life_days: 45
  rerank_weight: 0.35
