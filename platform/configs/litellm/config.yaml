model_list:
  - model_name: router-cheap
    litellm_params:
      model: openrouter/qwen/qwen3-coder
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: reader-fast
    litellm_params:
      model: openrouter/z-ai/glm-4.6
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: coder-strong
    litellm_params:
      model: openrouter/openai/gpt-5-codex
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: reviewer-mid
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: hypermemory-embedding
    litellm_params:
      model: os.environ/HYPERMEMORY_EMBEDDING_MODEL
      api_base: os.environ/HYPERMEMORY_EMBEDDING_API_BASE

litellm_settings:
  callbacks: ["otel"]
  service_callbacks: ["prometheus"]
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  routing_strategy: "least-busy"
  fallbacks:
    - {"coder-strong": ["reviewer-mid", "reader-fast"]}
    - {"reviewer-mid": ["coder-strong", "reader-fast"]}

default_team_settings:
  - team_id: "platform-default"
    max_budget: 50.0
    budget_duration: "30d"
