cases:
  - id: common-cli-smoke
    kind: command
    command: ["python3", "-m", "clawops", "merge-json", "--help"]
    assert:
      exit_code: 0
      stdout_contains: ["--base", "--overlay", "--output"]

  - id: context-cli-smoke
    kind: command
    command: ["python3", "-m", "clawops", "context", "--help"]
    assert:
      exit_code: 0
      stdout_contains: ["index", "query", "pack"]
