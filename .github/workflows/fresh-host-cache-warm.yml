name: Fresh Host Cache Warm

on:
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRESH_HOST_MACOS_IMAGE_CACHE_FORMAT_VERSION: "v2"
  MACOS_COLIMA_VERSION: "v0.10.1"
  MACOS_LIMA_VERSION: "v2.0.3"
  MACOS_COLIMA_DISK_GIB: "20"
  DEFAULT_MACOS_RUNTIME_PROVIDER: "colima"
  FRESH_HOST_CACHE_ROOT: ${{ github.workspace }}/.github-cache
  UV_CACHE_DIR: ${{ github.workspace }}/.github-cache/uv
  npm_config_cache: ${{ github.workspace }}/.github-cache/npm
  npm_config_prefer_offline: "true"
  HOMEBREW_CACHE: ${{ github.workspace }}/.github-cache/homebrew
  FRESH_HOST_MACOS_RUNTIME_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.github-cache/macos-runtime-tools
  FRESH_HOST_DOCKER_IMAGE_CACHE_DIR: ${{ github.workspace }}/.github-cache/docker-images

jobs:
  linux-package-cache:
    name: Warm Linux Fresh Host Package Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: linux_package_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Warm Linux fresh-host package cache
        run: ./tests/scripts/fresh_host_cache.py warm-packages --repo-root . --home-dir "${RUNNER_TEMP}/strongclaw-cache-home"
      - if: ${{ success() && steps.linux_package_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}

  macos-caches:
    name: Warm macOS Fresh Host Caches
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: macos_package_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Restore hosted macOS Homebrew download cache
        id: macos_homebrew_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.HOMEBREW_CACHE }}
          key: fresh-host-homebrew-${{ runner.os }}-${{ runner.arch }}-docker-tooling
          restore-keys: |
            fresh-host-homebrew-${{ runner.os }}-${{ runner.arch }}-
      - name: Restore hosted macOS runtime download cache
        id: macos_runtime_download_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .github-cache/macos-runtime-tools
          key: fresh-host-macos-runtime-tools-${{ runner.arch }}-${{ env.MACOS_LIMA_VERSION }}-${{ env.MACOS_COLIMA_VERSION }}
          restore-keys: |
            fresh-host-macos-runtime-tools-${{ runner.arch }}-
      - name: Restore hosted macOS Docker image cache
        id: macos_image_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .github-cache/docker-images
          key: fresh-host-macos-images-${{ runner.arch }}-${{ env.FRESH_HOST_MACOS_IMAGE_CACHE_FORMAT_VERSION }}-${{ hashFiles('platform/compose/docker-compose.aux-stack.ci-hosted-macos.yaml', 'platform/compose/docker-compose.browser-lab.ci-hosted-macos.yaml') }}
          restore-keys: |
            fresh-host-macos-images-${{ runner.arch }}-${{ env.FRESH_HOST_MACOS_IMAGE_CACHE_FORMAT_VERSION }}-
            fresh-host-macos-images-${{ runner.arch }}-
      - name: Warm macOS fresh-host package cache
        run: ./tests/scripts/fresh_host_cache.py warm-packages --repo-root . --home-dir "${RUNNER_TEMP}/strongclaw-cache-home"
      - name: Prepare macOS cache warm context
        run: ./tests/scripts/fresh_host.py prepare-context --scenario macos-sidecars --repo-root . --runner-temp "${RUNNER_TEMP}" --workspace "${GITHUB_WORKSPACE}" --github-env-file "${GITHUB_ENV}" --freshness-mode warm
      - name: Preview macOS cache warm context
        run: ./tests/scripts/fresh_host.py preview-context --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - name: Warm hosted macOS runtime downloads
        run: ./tests/scripts/hosted_docker.py install-runtime --context "${FRESH_HOST_CONTEXT}" --github-env-file "${GITHUB_ENV}"
      - name: Restore hosted macOS Docker images from cache
        run: ./tests/scripts/hosted_docker.py restore-image-cache --context "${FRESH_HOST_CONTEXT}"
      - name: Ensure hosted macOS Docker images
        run: ./tests/scripts/hosted_docker.py ensure-images --context "${FRESH_HOST_CONTEXT}"
      - name: Save hosted macOS Docker image cache archive
        run: ./tests/scripts/hosted_docker.py save-image-cache --context "${FRESH_HOST_CONTEXT}"
      - name: Clean up macOS cache warm context
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        continue-on-error: true
        run: ./tests/scripts/fresh_host.py cleanup --context "${FRESH_HOST_CONTEXT}"
      - name: Prepare macOS browser-lab cache warm context
        run: ./tests/scripts/fresh_host.py prepare-context --scenario macos-browser-lab --repo-root . --runner-temp "${RUNNER_TEMP}" --workspace "${GITHUB_WORKSPACE}" --github-env-file "${GITHUB_ENV}" --freshness-mode warm
      - name: Preview macOS browser-lab cache warm context
        run: ./tests/scripts/fresh_host.py preview-context --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - name: Warm hosted macOS runtime downloads for browser-lab
        run: ./tests/scripts/hosted_docker.py install-runtime --context "${FRESH_HOST_CONTEXT}" --github-env-file "${GITHUB_ENV}"
      - name: Restore hosted macOS browser-lab Docker images from cache
        run: ./tests/scripts/hosted_docker.py restore-image-cache --context "${FRESH_HOST_CONTEXT}"
      - name: Ensure hosted macOS browser-lab Docker images
        run: ./tests/scripts/hosted_docker.py ensure-images --context "${FRESH_HOST_CONTEXT}"
      - name: Save hosted macOS browser-lab Docker image cache archive
        run: ./tests/scripts/hosted_docker.py save-image-cache --context "${FRESH_HOST_CONTEXT}"
      - name: Clean up macOS browser-lab cache warm context
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        continue-on-error: true
        run: ./tests/scripts/fresh_host.py cleanup --context "${FRESH_HOST_CONTEXT}"
      - if: ${{ success() && steps.macos_package_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
      - if: ${{ success() && steps.macos_homebrew_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.HOMEBREW_CACHE }}
          key: fresh-host-homebrew-${{ runner.os }}-${{ runner.arch }}-docker-tooling
      - if: ${{ success() && steps.macos_runtime_download_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .github-cache/macos-runtime-tools
          key: fresh-host-macos-runtime-tools-${{ runner.arch }}-${{ env.MACOS_LIMA_VERSION }}-${{ env.MACOS_COLIMA_VERSION }}
      - if: ${{ success() && steps.macos_image_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .github-cache/docker-images
          key: fresh-host-macos-images-${{ runner.arch }}-${{ env.FRESH_HOST_MACOS_IMAGE_CACHE_FORMAT_VERSION }}-${{ hashFiles('platform/compose/docker-compose.aux-stack.ci-hosted-macos.yaml', 'platform/compose/docker-compose.browser-lab.ci-hosted-macos.yaml') }}
