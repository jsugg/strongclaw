name: Fresh Host Cache Warm

on:
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRESH_HOST_CACHE_ROOT: ${{ github.workspace }}/.github-cache
  UV_CACHE_DIR: ${{ github.workspace }}/.github-cache/uv
  npm_config_cache: ${{ github.workspace }}/.github-cache/npm
  npm_config_prefer_offline: "true"

jobs:
  linux-package-cache:
    name: Warm Linux Fresh Host Package Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: linux_package_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Warm Linux fresh-host package cache
        run: ./tests/scripts/fresh_host_cache.py warm-packages --repo-root . --home-dir "${RUNNER_TEMP}/strongclaw-cache-home"
      - if: ${{ success() && steps.linux_package_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}

  macos-package-cache:
    name: Warm macOS Fresh Host Package Cache
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: macos_package_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Warm macOS fresh-host package cache
        run: ./tests/scripts/fresh_host_cache.py warm-packages --repo-root . --home-dir "${RUNNER_TEMP}/strongclaw-cache-home"
      - if: ${{ success() && steps.macos_package_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
