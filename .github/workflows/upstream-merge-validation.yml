name: Upstream Integration Validation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-merged-upstream:
    name: Validate Upstream Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
      - run: uv sync --locked
      - run: uv run python -m clawops supply-chain --repo-root . quality-gate
      - run: mkdir -p "$RUNNER_TEMP/strongclaw/upstream"
      - run: PYTHONPATH=src uv run python -m clawops harness --suite platform/configs/harness/security_regressions.yaml --output "$RUNNER_TEMP/strongclaw/upstream/security.jsonl"
      - run: PYTHONPATH=src uv run python -m clawops harness --suite platform/configs/harness/policy_regressions.yaml --output "$RUNNER_TEMP/strongclaw/upstream/policy.jsonl"
      - run: PYTHONPATH=src uv run python -m clawops context codebase index --config platform/configs/context/codebase.yaml --repo . --scale small --json
      - run: PYTHONPATH=src uv run python -m clawops workflow --workflow platform/configs/workflows/daily_healthcheck.yaml --dry-run
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: upstream-merge-artifacts
          path: |
            coverage.xml
            pytest.xml
            ${{ runner.temp }}/strongclaw/upstream
