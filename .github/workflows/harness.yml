name: Policy Harness Smoke Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-harness-smoke:
    name: Execute Policy Harness Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: ./scripts/ci/sync_dev_environment.sh
      - run: ./scripts/bootstrap/run_harness_smoke.sh "$RUNNER_TEMP/strongclaw/harness"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: harness-runs
          path: ${{ runner.temp }}/strongclaw/harness
