name: harness

on:
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: ./scripts/bootstrap/run_harness_smoke.sh ./.runs
