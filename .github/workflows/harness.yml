name: harness

on:
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: python -m clawops harness --suite platform/configs/harness/security_regressions.yaml --output ./.runs/security.jsonl
      - run: python -m clawops harness --suite platform/configs/harness/policy_regressions.yaml --output ./.runs/policy.jsonl
