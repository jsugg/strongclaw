name: nightly

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: pytest -q --cov=src/clawops --cov-report=xml
      - run: python -m compileall -q src tests
      - run: ./scripts/bootstrap/run_harness_smoke.sh ./.runs
      - run: python -m clawops context index --config platform/configs/context/context-service.yaml --repo . --json
      - run: python -m clawops workflow --workflow platform/configs/workflows/daily_healthcheck.yaml --dry-run
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: nightly-artifacts
          path: |
            coverage.xml
            ./.runs
