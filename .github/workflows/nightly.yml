name: Nightly Test Run

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-nightly-validation:
    name: Run Nightly Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q --junitxml=pytest.xml --cov=src/clawops --cov-report=xml
      - run: PYTHONPATH=src uv run python -m compileall -q src tests
      - run: mkdir -p "$RUNNER_TEMP/strongclaw/nightly"
      - run: PYTHONPATH=src uv run python -m clawops harness --suite platform/configs/harness/security_regressions.yaml --output "$RUNNER_TEMP/strongclaw/nightly/security.jsonl"
      - run: PYTHONPATH=src uv run python -m clawops harness --suite platform/configs/harness/policy_regressions.yaml --output "$RUNNER_TEMP/strongclaw/nightly/policy.jsonl"
      - run: PYTHONPATH=src uv run python -m clawops context index --config platform/configs/context/context-service.yaml --repo . --json
      - run: PYTHONPATH=src uv run python -m clawops workflow --workflow platform/configs/workflows/daily_healthcheck.yaml --dry-run
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: nightly-artifacts
          path: |
            coverage.xml
            pytest.xml
            ${{ runner.temp }}/strongclaw/nightly

  warm-fresh-host-caches:
    name: Warm Fresh Host Caches
    uses: ./.github/workflows/fresh-host-cache-warm.yml

  run-nightly-fresh-host-acceptance:
    name: Nightly Fresh Host Acceptance
    needs: warm-fresh-host-caches
    uses: ./.github/workflows/fresh-host-core.yml
    with:
      macos_runtime_provider: colima
      docker_pull_parallelism: "2"
      docker_pull_max_attempts: "3"
      enable_package_cache: true
      enable_homebrew_cache: true
      enable_runtime_download_cache: true
