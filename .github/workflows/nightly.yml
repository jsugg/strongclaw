name: nightly

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: pytest -q
      - run: python -m compileall -q src tests
      - run: python -m clawops workflow --workflow platform/configs/workflows/daily_healthcheck.yaml --dry-run
