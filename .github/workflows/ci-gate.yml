name: CI

on:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  classify:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      fresh_host: ${{ steps.filter.outputs.fresh_host }}
      security: ${{ steps.filter.outputs.security }}
      harness: ${{ steps.filter.outputs.harness }}
      memory_plugin: ${{ steps.filter.outputs.memory_plugin }}
      compatibility_matrix: ${{ steps.filter.outputs.compatibility_matrix }}
      any_heavy: ${{ steps.selection.outputs.any_heavy }}
      docs_parity_required: ${{ steps.selection.outputs.docs_parity_required }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: export_filters
        name: Export gate filters
        run: python3 ./tests/scripts/ci_gate.py emit-filters --filters-file .github/ci/ci-gate-filters.yml --github-output-file "$GITHUB_OUTPUT"
      - id: filter
        name: Detect changed lanes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: ${{ steps.export_filters.outputs.filters }}
          list-files: json
      - id: selection
        name: Summarize lane selection
        env:
          DOCS_ONLY_FILES: ${{ steps.filter.outputs.docs_only_files }}
          FRESH_HOST_FILES: ${{ steps.filter.outputs.fresh_host_files }}
          SECURITY_FILES: ${{ steps.filter.outputs.security_files }}
          HARNESS_FILES: ${{ steps.filter.outputs.harness_files }}
          MEMORY_PLUGIN_FILES: ${{ steps.filter.outputs.memory_plugin_files }}
          COMPATIBILITY_MATRIX_FILES: ${{ steps.filter.outputs.compatibility_matrix_files }}
        run: >-
          python3 ./tests/scripts/ci_gate.py summarize-selection
          --docs-only "${{ steps.filter.outputs.docs_only }}"
          --fresh-host "${{ steps.filter.outputs.fresh_host }}"
          --security "${{ steps.filter.outputs.security }}"
          --harness "${{ steps.filter.outputs.harness }}"
          --memory-plugin "${{ steps.filter.outputs.memory_plugin }}"
          --compatibility-matrix "${{ steps.filter.outputs.compatibility_matrix }}"
          --docs-only-files "$DOCS_ONLY_FILES"
          --fresh-host-files "$FRESH_HOST_FILES"
          --security-files "$SECURITY_FILES"
          --harness-files "$HARNESS_FILES"
          --memory-plugin-files "$MEMORY_PLUGIN_FILES"
          --compatibility-matrix-files "$COMPATIBILITY_MATRIX_FILES"
          --github-output-file "$GITHUB_OUTPUT"
          --github-summary-file "$GITHUB_STEP_SUMMARY"

  docs_parity:
    name: Docs Parity
    needs: classify
    if: needs.classify.outputs.docs_parity_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: python3 ./tests/scripts/ci_gate.py run-docs-parity --repo-root .

  harness:
    needs: classify
    if: needs.classify.outputs.harness == 'true'
    uses: ./.github/workflows/harness.yml
    secrets: inherit

  compatibility_matrix:
    needs: classify
    if: needs.classify.outputs.compatibility_matrix == 'true'
    uses: ./.github/workflows/compatibility-matrix.yml
    secrets: inherit

  memory_plugin:
    needs: classify
    if: needs.classify.outputs.memory_plugin == 'true'
    uses: ./.github/workflows/memory-plugin-verification.yml
    secrets: inherit

  fresh_host:
    needs:
      - classify
      - harness
      - compatibility_matrix
      - memory_plugin
    if: >-
      needs.classify.outputs.fresh_host == 'true' &&
      needs.harness.result != 'failure' &&
      needs.harness.result != 'cancelled' &&
      needs.compatibility_matrix.result != 'failure' &&
      needs.compatibility_matrix.result != 'cancelled' &&
      needs.memory_plugin.result != 'failure' &&
      needs.memory_plugin.result != 'cancelled'
    uses: ./.github/workflows/fresh-host-acceptance.yml
    secrets: inherit

  security:
    needs:
      - classify
      - harness
      - compatibility_matrix
      - memory_plugin
    if: >-
      needs.classify.outputs.security == 'true' &&
      needs.harness.result != 'failure' &&
      needs.harness.result != 'cancelled' &&
      needs.compatibility_matrix.result != 'failure' &&
      needs.compatibility_matrix.result != 'cancelled' &&
      needs.memory_plugin.result != 'failure' &&
      needs.memory_plugin.result != 'cancelled'
    uses: ./.github/workflows/security.yml
    secrets: inherit

  verdict:
    name: Verdict
    needs:
      - classify
      - docs_parity
      - harness
      - compatibility_matrix
      - memory_plugin
      - fresh_host
      - security
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Evaluate final verdict
        run: python3 ./tests/scripts/ci_gate.py verdict --docs-only "${{ needs.classify.outputs.docs_only }}" --fresh-host "${{ needs.classify.outputs.fresh_host }}" --security "${{ needs.classify.outputs.security }}" --harness "${{ needs.classify.outputs.harness }}" --memory-plugin "${{ needs.classify.outputs.memory_plugin }}" --compatibility-matrix "${{ needs.classify.outputs.compatibility_matrix }}" --classify-result "${{ needs.classify.result }}" --docs-parity-result "${{ needs.docs_parity.result }}" --harness-result "${{ needs.harness.result }}" --compatibility-matrix-result "${{ needs.compatibility_matrix.result }}" --memory-plugin-result "${{ needs.memory_plugin.result }}" --fresh-host-result "${{ needs.fresh_host.result }}" --security-result "${{ needs.security.result }}" --github-summary-file "$GITHUB_STEP_SUMMARY"
