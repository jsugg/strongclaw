name: Fresh Host Acceptance

on:
  pull_request:
  workflow_dispatch:
    inputs:
      macos_runtime_provider:
        description: Hosted macOS container runtime provider.
        required: true
        type: string
        default: colima
      docker_pull_parallelism:
        description: Parallelism for hosted macOS Docker image pulling.
        required: true
        type: string
        default: "2"
      docker_pull_max_attempts:
        description: Retry attempts for hosted macOS Docker image pulling.
        required: true
        type: string
        default: "3"
      enable_package_cache:
        description: Restore uv and npm download caches for bootstrap.
        required: true
        type: boolean
        default: true
      enable_homebrew_cache:
        description: Restore the hosted macOS Homebrew download cache.
        required: true
        type: boolean
        default: true
      enable_runtime_download_cache:
        description: Restore cached hosted macOS runtime binaries for Colima/Lima.
        required: true
        type: boolean
        default: true

concurrency:
  group: >-
    fresh-host-acceptance-${{ github.workflow }}-${{
      github.event_name == 'workflow_dispatch'
      && format(
        '{0}-{1}-{2}-{3}-{4}-{5}',
        github.ref,
        inputs.macos_runtime_provider,
        inputs.docker_pull_parallelism,
        inputs.docker_pull_max_attempts,
        inputs.enable_package_cache,
        inputs.enable_runtime_download_cache
      )
      || github.event.pull_request.number
      || github.ref
    }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fresh-host-acceptance:
    name: Fresh Host Acceptance
    uses: ./.github/workflows/fresh-host-core.yml
    with:
      macos_runtime_provider: ${{ github.event_name == 'workflow_dispatch' && inputs.macos_runtime_provider || 'colima' }}
      docker_pull_parallelism: ${{ github.event_name == 'workflow_dispatch' && inputs.docker_pull_parallelism || '2' }}
      docker_pull_max_attempts: ${{ github.event_name == 'workflow_dispatch' && inputs.docker_pull_max_attempts || '3' }}
      enable_package_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_package_cache }}
      enable_homebrew_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_homebrew_cache }}
      enable_runtime_download_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_runtime_download_cache }}
