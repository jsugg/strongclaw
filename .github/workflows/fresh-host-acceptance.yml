name: Fresh Host Acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fresh-host-acceptance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEFAULT_MACOS_RUNTIME_PROVIDER: "colima"
  FRESH_HOST_DOCKER_PULL_PARALLELISM: "2"
  FRESH_HOST_DOCKER_PULL_MAX_ATTEMPTS: "3"
  MACOS_COLIMA_DISK_GIB: "20"

jobs:
  linux-fresh-host:
    name: Linux Fresh Host
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
      - run: ./tests/scripts/fresh_host.py prepare-context --scenario linux --repo-root . --runner-temp "${RUNNER_TEMP}" --workspace "${GITHUB_WORKSPACE}" --github-env-file "${GITHUB_ENV}"
      - run: ./tests/scripts/fresh_host.py run-scenario --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/fresh_host.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/fresh_host.py write-summary --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-fresh-host-artifacts
          path: |
            ${{ runner.temp }}/strongclaw-linux-host/home/.openclaw
            ${{ runner.temp }}/strongclaw-linux-host/home/.config/systemd/user
            ${{ runner.temp }}/fresh-host-reports/linux
          include-hidden-files: true

  macos-fresh-host:
    name: macOS Fresh Host
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: ./tests/scripts/fresh_host.py prepare-context --scenario macos --repo-root . --runner-temp "${RUNNER_TEMP}" --workspace "${GITHUB_WORKSPACE}" --github-env-file "${GITHUB_ENV}"
      - run: ./tests/scripts/hosted_docker.py install-runtime --context "${FRESH_HOST_CONTEXT}" --github-env-file "${GITHUB_ENV}"
      - run: ./tests/scripts/hosted_docker.py ensure-images --context "${FRESH_HOST_CONTEXT}"
      - run: ./tests/scripts/fresh_host.py run-scenario --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/hosted_docker.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/fresh_host.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/fresh_host.py cleanup --context "${FRESH_HOST_CONTEXT}"
      - if: always()
        run: ./tests/scripts/fresh_host.py write-summary --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-fresh-host-artifacts
          path: |
            ${{ runner.temp }}/strongclaw-macos-host/home/.openclaw
            ${{ runner.temp }}/strongclaw-macos-host/home/Library/LaunchAgents
            ${{ runner.temp }}/fresh-host-reports/macos
          include-hidden-files: true
