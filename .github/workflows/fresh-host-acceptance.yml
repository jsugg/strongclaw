name: Acceptance Tests

on:
  workflow_call:
    inputs:
      docker_pull_parallelism:
        description: Parallelism for hosted macOS Docker image pulling.
        required: false
        type: string
        default: "2"
      docker_pull_max_attempts:
        description: Retry attempts for hosted macOS Docker image pulling.
        required: false
        type: string
        default: "3"
      enable_package_cache:
        description: Restore uv and npm download caches for bootstrap.
        required: false
        type: boolean
        default: true
      enable_image_cache:
        description: Restore and save Docker image cache to skip image pulls.
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      docker_pull_parallelism:
        description: Parallelism for hosted macOS Docker image pulling.
        required: true
        type: string
        default: "2"
      docker_pull_max_attempts:
        description: Retry attempts for hosted macOS Docker image pulling.
        required: true
        type: string
        default: "3"
      enable_package_cache:
        description: Restore uv and npm download caches for bootstrap.
        required: true
        type: boolean
        default: true
      enable_image_cache:
        description: Restore and save Docker image cache to skip image pulls.
        required: true
        type: boolean
        default: true

concurrency:
  group: >-
    fresh-host-acceptance-${{ github.workflow }}-${{ format(
      '{0}-{1}-{2}',
      github.ref,
      inputs.docker_pull_parallelism,
      inputs.docker_pull_max_attempts
    ) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fresh-host-acceptance:
    name: Fresh Host
    uses: ./.github/workflows/fresh-host-core.yml
    with:
      docker_pull_parallelism: ${{ inputs.docker_pull_parallelism }}
      docker_pull_max_attempts: ${{ inputs.docker_pull_max_attempts }}
      enable_package_cache: ${{ inputs.enable_package_cache }}
      enable_image_cache: ${{ inputs.enable_image_cache }}
