name: Memory Plugin Integration Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-vendored-memory-plugin:
    name: Run Memory Plugin Integration Checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.16.0", "24.13.1"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: platform/plugins/memory-lancedb-pro/package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - run: PYTHONPATH=src uv run python -m clawops config --repo-root . memory --set-profile memory-lancedb-pro --output "$RUNNER_TEMP/openclaw.json"
      - run: |
          tool_dir="$(mktemp -d "${TMPDIR:-/tmp}/strongclaw-openclaw-cli.XXXXXX")"
          npm install --prefix "$tool_dir" --no-fund --no-audit "openclaw@2026.3.13"
          export PATH="$tool_dir/node_modules/.bin:$PATH"
          cd platform/plugins/memory-lancedb-pro
          npm ci --no-fund --no-audit
          env \
            -u AWS_PROFILE \
            -u AWS_ACCESS_KEY_ID \
            -u AWS_SECRET_ACCESS_KEY \
            -u AWS_SESSION_TOKEN \
            -u AWS_DEFAULT_REGION \
            -u AWS_REGION \
            npm run test:openclaw-host
  verify-hypermemory-qdrant:
    name: Run Hypermemory Qdrant Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      qdrant:
        image: ghcr.io/qdrant/qdrant/qdrant:v1.15.5@sha256:21934642fbdc0010b3df46ab214a755fda7a4631a58beec89b050baca4c78311
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:6333/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Qdrant failed to become ready" >&2
          exit 1
      - run: uv run pytest -q -m "hypermemory and qdrant"
        env:
          QDRANT_TEST_MODE: real
          TEST_QDRANT_URL: http://127.0.0.1:6333
  verify-strongclaw-hypermemory-host:
    name: Run strongclaw-hypermemory Host Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.13.1"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - run: cd platform/plugins/strongclaw-hypermemory && npm run test:openclaw-host
