name: memory-plugin-verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-vendored-memory-plugin:
    name: Verify vendored memory plugin
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.13.1"
          cache: npm
          cache-dependency-path: platform/plugins/memory-lancedb-pro/package-lock.json
      - run: ./scripts/ci/verify_vendored_memory_plugin.sh
