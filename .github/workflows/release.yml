name: Release Build and Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-quality-gate:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - run: uv sync --locked
      - name: Run repository quality gate
        run: uv run python -m clawops supply-chain --repo-root . quality-gate

  release-fresh-host-acceptance:
    name: Release Fresh Host Acceptance
    uses: ./.github/workflows/fresh-host-core.yml

  release-memory-plugin-verification:
    name: Release Memory Plugin Verification
    uses: ./.github/workflows/memory-plugin-verification.yml

  release-runtime-readiness:
    name: Release Runtime Readiness
    needs:
      - release-quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - name: Run release runtime-readiness commands
        run: python3 ./tests/scripts/release_workflow.py runtime-readiness --repo-root .

  publish-release-artifacts:
    name: Build Verify and Publish Release
    needs:
      - release-quality-gate
      - release-fresh-host-acceptance
      - release-memory-plugin-verification
      - release-runtime-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - name: Verify release tag matches package version
        run: python3 ./tests/scripts/release_workflow.py verify-tag-version --tag "${GITHUB_REF_NAME}" --repo-root .
      - name: Clean release artifact directories
        run: python3 ./tests/scripts/release_workflow.py clean-artifacts --path build --path dist
      - name: Build release artifacts
        run: uv run python -m build
      - name: Verify release artifacts
        run: python3 ./tests/scripts/release_workflow.py verify-artifacts --dist-dir dist
      - uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: dist
          format: spdx-json
          output-file: sbom.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts
          path: |
            dist/*
            sbom.spdx.json
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 ./tests/scripts/release_workflow.py publish-github-release --tag "${GITHUB_REF_NAME}" --dist-dir dist --sbom-path sbom.spdx.json
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*
      - uses: actions/attest-sbom@07e74fc4e78d1aad915e867f9a094073a9f71527 # v4.0.0
        with:
          subject-path: |
            dist/*
          sbom-path: sbom.spdx.json
