name: Release Build and Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-release-artifacts:
    name: Build Verify and Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - name: Run repository quality gate
        run: uv run python -m clawops supply-chain --repo-root . quality-gate
      - name: Build release artifacts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          for path in (Path("build"), Path("dist")):
              shutil.rmtree(path, ignore_errors=True)
          PY
          uv run python -m build
      - name: Verify release artifacts
        run: |
          uv run twine check dist/*
          wheel_path="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          sdist_path="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$wheel_path"
          test -n "$sdist_path"
          tmp_dir="$(mktemp -d "${TMPDIR:-/tmp}/strongclaw-release-verify.XXXXXX")"
          python3 -m venv "$tmp_dir/wheel-env"
          "$tmp_dir/wheel-env/bin/python" -m pip install --upgrade pip
          "$tmp_dir/wheel-env/bin/python" -m pip install "$wheel_path"
          "$tmp_dir/wheel-env/bin/python" - <<'PY'
          import importlib.metadata as metadata
          import clawops

          assert metadata.version("clawops")
          assert clawops.__file__
          PY
          python3 -m venv "$tmp_dir/sdist-env"
          "$tmp_dir/sdist-env/bin/python" -m pip install --upgrade pip
          "$tmp_dir/sdist-env/bin/python" -m pip install "$sdist_path"
          "$tmp_dir/sdist-env/bin/python" - <<'PY'
          import importlib.metadata as metadata
          import clawops

          assert metadata.version("clawops")
          assert clawops.__file__
          PY
      - uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: dist
          format: spdx-json
          output-file: sbom.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts
          path: |
            dist/*
            sbom.spdx.json
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* sbom.spdx.json --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* sbom.spdx.json --verify-tag --generate-notes
          fi
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*
      - uses: actions/attest-sbom@07e74fc4e78d1aad915e867f9a094073a9f71527 # v4.0.0
        with:
          subject-path: |
            dist/*
          sbom-path: sbom.spdx.json
