name: Fresh Host Core

on:
  workflow_call:
    inputs:
      docker_pull_parallelism:
        required: false
        type: string
        default: "2"
      docker_pull_max_attempts:
        required: false
        type: string
        default: "3"
      enable_package_cache:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRESH_HOST_DOCKER_PULL_PARALLELISM: "4"
  FRESH_HOST_DOCKER_PULL_MAX_ATTEMPTS: "3"
  FRESH_HOST_CACHE_ROOT: ${{ github.workspace }}/.github-cache
  UV_CACHE_DIR: ${{ github.workspace }}/.github-cache/uv
  npm_config_cache: ${{ github.workspace }}/.github-cache/npm
  npm_config_prefer_offline: "true"

jobs:
  linux-fresh-host:
    name: Linux Fresh Host (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        profile:
          - openclaw-default
          - hypermemory
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: linux_package_cache
        if: ${{ inputs.enable_package_cache }}
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Prepare Linux fresh-host context
        run: ./tests/scripts/fresh_host.py prepare-context --scenario linux --profile "${{ matrix.profile }}" --repo-root . --runner-temp "${RUNNER_TEMP}" --workspace "${GITHUB_WORKSPACE}" --github-env-file "${GITHUB_ENV}"
      - name: Preview Linux fresh-host context
        run: ./tests/scripts/fresh_host.py preview-context --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - name: Ensure Linux fresh-host Docker images
        run: ./tests/scripts/hosted_docker.py ensure-images --context "${FRESH_HOST_CONTEXT}"
      - name: Run Linux fresh-host scenario
        run: ./tests/scripts/fresh_host.py run-scenario --context "${FRESH_HOST_CONTEXT}"
      - name: Collect Linux fresh-host diagnostics
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        run: ./tests/scripts/fresh_host.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - name: Write Linux fresh-host summary
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        env:
          FRESH_HOST_PACKAGE_CACHE_ENABLED: ${{ inputs.enable_package_cache }}
          FRESH_HOST_PACKAGE_CACHE_HIT: ${{ steps.linux_package_cache.outputs.cache-hit == 'true' }}
        run: ./tests/scripts/fresh_host.py write-summary --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-fresh-host-artifacts-${{ matrix.profile }}
          path: |
            ${{ runner.temp }}/strongclaw-linux-host/home/.openclaw
            ${{ runner.temp }}/strongclaw-linux-host/home/.config/systemd/user
            ${{ runner.temp }}/fresh-host-reports/linux
            ${{ github.workspace }}/.omx/evidence
          include-hidden-files: true

  macos-fresh-host:
    name: ${{ matrix.job_name }}
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario_id: macos-sidecars
            profile: openclaw-default
            job_name: macOS Fresh Host Sidecars (openclaw-default)
            artifact_name: macos-sidecars-openclaw-default-fresh-host-artifacts
            report_dir_name: macos-sidecars
          - scenario_id: macos-sidecars
            profile: hypermemory
            job_name: macOS Fresh Host Sidecars (hypermemory)
            artifact_name: macos-sidecars-hypermemory-fresh-host-artifacts
            report_dir_name: macos-sidecars
          - scenario_id: macos-browser-lab
            profile: openclaw-default
            job_name: macOS Fresh Host Browser Lab (openclaw-default)
            artifact_name: macos-browser-lab-openclaw-default-fresh-host-artifacts
            report_dir_name: macos-browser-lab
          - scenario_id: macos-browser-lab
            profile: hypermemory
            job_name: macOS Fresh Host Browser Lab (hypermemory)
            artifact_name: macos-browser-lab-hypermemory-fresh-host-artifacts
            report_dir_name: macos-browser-lab
    env:
      FRESH_HOST_SELECTED_DOCKER_PULL_PARALLELISM: ${{ inputs.docker_pull_parallelism }}
      FRESH_HOST_SELECTED_DOCKER_PULL_MAX_ATTEMPTS: ${{ inputs.docker_pull_max_attempts }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Docker via Colima
        # macos-15 is Apple Silicon (arm64). OrbStack does not start on GHA headless
        # arm64 runners (daemon fails to initialize without a GUI session).
        # Colima provides an equivalent Docker daemon via Apple Virtualization.framework
        # (--vz flag), available on M1 GHA runners and starts in ~60-90s.
        # --vz-rosetta enables Rosetta 2 so amd64-pinned image digests run transparently;
        # required because compose files pin to amd64-specific SHA256 digests.
        # Placed before setup-python/node to overlap startup with toolchain setup steps.
        # NOTE: commands use newline-separated `|` form to ensure the echo to GITHUB_ENV
        # runs in the foreground before the step exits. A trailing `&` on a `>-` one-liner
        # causes bash to background the *entire* &&-chain, making the GITHUB_ENV write
        # race against GHA reading the file for the next step.
        run: |
          # Install Rosetta 2 — required by --vz-rosetta; not pre-installed on GHA arm64 runners.
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 \
            brew install --quiet colima docker docker-compose
          mkdir -p ~/.docker/cli-plugins
          ln -sfn "$(brew --prefix)/bin/docker-compose" ~/.docker/cli-plugins/docker-compose
          echo "DOCKER_HOST=unix://${HOME}/.colima/default/docker.sock" >> "${GITHUB_ENV}"
          # --network-address omitted: requires com.apple.vmnet entitlement absent on GHA runners.
          # Containers reach external hosts via NAT (Lima default), which is sufficient here.
          nohup colima start --vz --vz-rosetta --cpu 3 --memory 6 \
            > /tmp/colima-start.log 2>&1 &
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22.22.1"
          package-manager-cache: false
      - name: Restore package download caches
        id: macos_package_cache
        if: ${{ inputs.enable_package_cache }}
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .github-cache/npm
            .github-cache/uv
          key: fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'src/clawops/strongclaw_bootstrap.py', 'platform/plugins/memory-lancedb-pro/package-lock.json') }}
          restore-keys: |
            fresh-host-packages-${{ runner.os }}-${{ runner.arch }}-
      - name: Prepare macOS fresh-host context
        run: >-
          ./tests/scripts/fresh_host.py prepare-context
          --scenario "${{ matrix.scenario_id }}"
          --profile "${{ matrix.profile }}"
          --repo-root .
          --runner-temp "${RUNNER_TEMP}"
          --workspace "${GITHUB_WORKSPACE}"
          --github-env-file "${GITHUB_ENV}"
      - name: Preview macOS fresh-host context
        run: ./tests/scripts/fresh_host.py preview-context --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - name: Wait for hosted macOS Docker runtime
        run: >-
          ./tests/scripts/hosted_docker.py wait-runtime-ready
          --context "${FRESH_HOST_CONTEXT}"
          --github-env-file "${GITHUB_ENV}"
      - name: Ensure hosted macOS Docker images
        run: ./tests/scripts/hosted_docker.py ensure-images --context "${FRESH_HOST_CONTEXT}"
      - name: Run macOS fresh-host scenario
        run: ./tests/scripts/fresh_host.py run-scenario --context "${FRESH_HOST_CONTEXT}"
      - name: Collect hosted macOS Docker diagnostics
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        run: ./tests/scripts/hosted_docker.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - name: Collect macOS fresh-host diagnostics
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        run: ./tests/scripts/fresh_host.py collect-diagnostics --context "${FRESH_HOST_CONTEXT}"
      - name: Write macOS fresh-host summary
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        env:
          FRESH_HOST_PACKAGE_CACHE_ENABLED: ${{ inputs.enable_package_cache }}
          FRESH_HOST_PACKAGE_CACHE_HIT: ${{ steps.macos_package_cache.outputs.cache-hit == 'true' }}
        run: ./tests/scripts/fresh_host.py write-summary --context "${FRESH_HOST_CONTEXT}" --summary-file "${GITHUB_STEP_SUMMARY}"
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ runner.temp }}/strongclaw-macos-host/home/.openclaw
            ${{ runner.temp }}/strongclaw-macos-host/home/Library/LaunchAgents
            ${{ runner.temp }}/fresh-host-reports/${{ matrix.report_dir_name }}
            ${{ github.workspace }}/.omx/evidence
            /tmp/colima-start.log
          include-hidden-files: true
      - name: Clean up macOS fresh-host context
        if: ${{ always() && env.FRESH_HOST_CONTEXT != '' }}
        run: ./tests/scripts/fresh_host.py cleanup --context "${FRESH_HOST_CONTEXT}"
