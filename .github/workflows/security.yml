name: Repository Security Analysis

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-security-scans:
    name: Run Repository Quality and Runtime Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run pre-commit run actionlint --all-files
      - run: uv run pre-commit run shellcheck --all-files
      - run: PYTHONPATH=src uv run pytest -q --cov=src/clawops --cov-report=xml --cov-report=term-missing
      - run: PYTHONPATH=src uv run python -m compileall -q src tests
      - name: Coverage summary
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          coverage = float(ET.parse("coverage.xml").getroot().attrib["line-rate"]) * 100
          Path(summary_path).open("a", encoding="utf-8").write(f"Coverage: {coverage:.2f}%\n")
          PY
      - uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: security/semgrep/semgrep.yml
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          install "${RUNNER_TEMP}/gitleaks" "${HOME}/.local/bin/gitleaks"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Run gitleaks
        run: gitleaks git --no-banner --no-color --exit-code 1 --log-level warn --redact
      - name: Install syft CLI
        env:
          SYFT_VERSION: "v1.42.2"
        run: |
          archive="syft_${SYFT_VERSION#v}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" syft
          install "${RUNNER_TEMP}/syft" "${HOME}/.local/bin/syft"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Generate SBOM
        run: syft dir:. -o spdx-json=sbom.spdx.json
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          cache: true
          scan-type: fs
          scan-ref: .
          trivy-config: security/trivy/trivy.yaml
      - name: Preserve historical code-scanning categories
        if: always()
        run: |
          cat > "${RUNNER_TEMP}/empty-security.sarif" <<'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "StrongClaw Security Placeholder",
                    "informationUri": "https://github.com/jsugg/strongclaw",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
      - uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/empty-security.sarif
          category: .github/workflows/security.yml:run-security-scans
      - uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/empty-security.sarif
          category: .github/workflows/security.yml:security
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: security-artifacts
          path: |
            coverage.xml
            sbom.spdx.json

  run-codeql-analysis:
    name: Run CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          config-file: security/codeql/codeql-config.yml
          languages: python,javascript
      - uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
