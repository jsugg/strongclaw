name: security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: pytest -q
      - run: python -m compileall -q src tests
      - uses: github/codeql-action/init@v4
        with:
          config-file: security/codeql/codeql-config.yml
          languages: python,javascript
      - uses: github/codeql-action/analyze@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: security/semgrep/semgrep.yml
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          install "${RUNNER_TEMP}/gitleaks" "${HOME}/.local/bin/gitleaks"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Run gitleaks
        run: gitleaks git --no-banner --no-color --exit-code 1 --log-level warn --redact
      - uses: aquasecurity/trivy-action@master
        with:
          cache: false
          scan-type: fs
          scan-ref: .
          trivy-config: security/trivy/trivy.yaml
