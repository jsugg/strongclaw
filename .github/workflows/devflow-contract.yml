name: devflow-contract

on:
  pull_request:
    paths:
      - ".github/workflows/devflow-contract.yml"
      - "platform/configs/devflow/**"
      - "platform/docs/DEVFLOW.md"
      - "platform/workers/acpx/**"
      - "src/clawops/devflow.py"
      - "src/clawops/devflow_*.py"
      - "src/clawops/git_gates.py"
      - "src/clawops/workspace_bootstrap.py"
      - "src/clawops/workflow_runner.py"
      - "src/clawops/op_journal.py"
      - "src/clawops/orchestration.py"
      - "tests/suites/**/test_devflow*.py"
      - "tests/suites/**/test_workflow_runner_devflow.py"
      - "tests/suites/**/test_workflow_runner_resume.py"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  devflow-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python -m compileall -q src tests
      - run: uv run --locked pytest -q -m devflow
      - run: uv run clawops devflow plan --project-root . --goal "contract smoke"
