name: Compatibility Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-matrix:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: PYTHONPATH=src uv run --project . --locked --extra dev pytest -q
      - run: PYTHONPATH=src uv run --project . --locked --extra dev python -m compileall -q src tests

  setup-smoke:
    name: Node ${{ matrix.node-version }} setup smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.16.0", "24.13.1"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: |
          TMP_PARENT="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
          TMP_ROOT="${SETUP_COMPAT_ROOT:-$TMP_PARENT/strongclaw-setup-compat}"
          HOME_DIR="${SETUP_COMPAT_HOME:-$TMP_ROOT/home}"
          mkdir -p "$HOME_DIR"
          export HOME="$HOME_DIR"
          export STRONGCLAW_DATA_DIR="${STRONGCLAW_DATA_DIR:-$TMP_ROOT/data}"
          export STRONGCLAW_STATE_DIR="${STRONGCLAW_STATE_DIR:-$TMP_ROOT/state}"
          export TMP_ROOT
          PYTHONPATH=src uv run python - <<'PY'
          import os
          import pathlib
          from clawops.common import write_json
          from clawops.openclaw_config import render_openclaw_profile
          from clawops.strongclaw_bootstrap import ensure_varlock_installed, install_lossless_claw_asset

          repo_root = pathlib.Path(".").resolve()
          tmp_root = pathlib.Path(os.environ["TMP_ROOT"]).expanduser().resolve()
          ensure_varlock_installed()
          install_lossless_claw_asset(repo_root)
          rendered = render_openclaw_profile(
              profile_name="hypermemory",
              repo_root=repo_root,
              home_dir=pathlib.Path.home(),
          )
          write_json(tmp_root / "openclaw.json", rendered)
          PY
      - run: |
          TMP_PARENT="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
          TMP_ROOT="${SETUP_COMPAT_ROOT:-$TMP_PARENT/strongclaw-setup-compat}"
          STRONGCLAW_DATA_DIR="${STRONGCLAW_DATA_DIR:-$TMP_ROOT/data}"
          test -f "$STRONGCLAW_DATA_DIR/plugins/lossless-claw/openclaw.plugin.json"
      - run: |
          TMP_PARENT="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
          TMP_ROOT="${SETUP_COMPAT_ROOT:-$TMP_PARENT/strongclaw-setup-compat}"
          export TMP_ROOT
          python - <<'PY'
          import json
          import os
          import pathlib

          payload = json.loads((pathlib.Path(os.environ["TMP_ROOT"]) / "openclaw.json").read_text(encoding="utf-8"))
          plugin_config = payload["plugins"]["entries"]["strongclaw-hypermemory"]["config"]
          assert plugin_config["configPath"].endswith("platform/configs/memory/hypermemory.yaml")
          assert plugin_config["autoRecall"] is True
          PY
