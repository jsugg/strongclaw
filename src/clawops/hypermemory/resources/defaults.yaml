storage:
  db_path: .openclaw/hypermemory.sqlite

workspace:
  memory_file_names:
    - MEMORY.md
    - memory.md
  daily_dir: memory
  bank_dir: bank
  include_default_memory: true

limits:
  max_snippet_chars: 400
  default_max_results: 8

governance:
  default_scope: project:strongclaw
  readable_scopes:
    - "project:"
    - "agent:"
    - "user:"
    - "global"
  writable_scopes:
    - "project:"
    - "agent:"
  auto_apply_scopes:
    - "project:"
    - "agent:"

backend:
  active: sqlite_fts
  fallback: sqlite_fts
  default_hypermemory_backend: qdrant_sparse_dense_hybrid

embedding:
  enabled: false
  provider: disabled
  model: ""
  base_url: ""
  api_key_env: null
  api_key: null
  batch_size: 32
  timeout_ms: 15000

rerank:
  enabled: false
  provider: none
  fallback_provider: none
  fail_open: true
  normalize_scores: true
  local:
    model: ""
    batch_size: 8
    max_length: 2048
    device: auto
  compatible_http:
    model: ""
    base_url: ""
    api_key_env: null
    api_key: null
    timeout_ms: 15000

hybrid:
  dense_candidate_pool: 24
  sparse_candidate_pool: 24
  vector_weight: 0.65
  text_weight: 0.35
  fusion: rrf
  rrf_k: 60
  rerank_candidate_pool: 0

qdrant:
  enabled: false
  url: http://127.0.0.1:6333
  collection: strongclaw-hypermemory
  dense_vector_name: dense
  sparse_vector_name: sparse
  timeout_ms: 3000
  api_key_env: null
  api_key: null

injection:
  max_results: 3
  max_chars_per_result: 280

dedup:
  enabled: false
  similarity_threshold: 0.92
  check_cross_scope: false
  typed_slots_enabled: true
  llm_assisted_enabled: false
  llm_near_threshold: 0.85

capture:
  enabled: false
  mode: llm
  min_message_length: 20
  max_candidates_per_session: 10
  incremental: true
  batch_size: 6
  batch_overlap: 2
  llm:
    endpoint: ""
    model: ""
    api_key_env: null
    api_key: null
    timeout_ms: 15000

decay:
  enabled: false
  half_life_days: 45.0
  recency_weight: 0.4
  frequency_weight: 0.3
  intrinsic_weight: 0.3
  beta_core: 0.8
  beta_working: 1.0
  beta_peripheral: 1.3
  promote_to_core_access: 10
  promote_to_core_composite: 0.7
  promote_to_core_importance: 0.8
  promote_to_working_access: 3
  promote_to_working_composite: 0.4
  demote_to_peripheral_composite: 0.15
  demote_to_peripheral_age_days: 60
  demote_to_peripheral_access: 3
  demote_from_core_composite: 0.15
  demote_from_core_access: 3

noise:
  enabled: true
  min_text_length: 10
  max_text_length: 2000

admission:
  enabled: false
  min_confidence: 0.3
  type_priors:
    fact: 0.85
    entity: 0.8
    opinion: 0.7
    reflection: 0.75

fact_registry:
  enabled: true
  auto_infer_keys: true

feedback:
  enabled: false
  reward_weight: 0.15
  penalty_weight: 0.2
  suppress_threshold: 3
  suppress_penalty: 0.5

retrieval:
  adaptive_pool: false
  adaptive_pool_max_multiplier: 4
  type_weights:
    fact: 1.0
    reflection: 0.95
    opinion: 0.9
    entity: 0.92
    proposal: 0.85
    paragraph: 0.88
    section: 0.82

ranking:
  memory_lane_weight: 1.0
  corpus_lane_weight: 1.0
  lexical_weight: 0.75
  coverage_weight: 0.35
  confidence_weight: 0.15
  recency_weight: 0.1
  contradiction_penalty: 0.2
  diversity_penalty: 0.35
  recency_half_life_days: 45
  rerank_weight: 0.35

engine:
  bank_headers:
    fact: |
      # World Model

      ## Entries
    reflection: |
      # Experience

      ## Entries
    opinion: |
      # Opinions

      ## Entries
  writable_prefixes:
    - memory/
    - bank/
  memory_pro:
    category_map:
      fact: fact
      reflection: other
      opinion: preference
      entity: entity
    importance_map:
      fact: 0.8
      reflection: 0.7
      opinion: 0.65
      entity: 0.75
  fact_key_inference_rules:
    - pattern: "(?i)\\b(?:my|the user'?s?) name is\\b"
      key: user:name
    - pattern: "(?i)\\b(?:my|the user'?s?) timezone is\\b"
      key: user:timezone
    - pattern: "(?i)\\b(?:my|the user'?s?) role is\\b"
      key: user:role
    - pattern: "(?i)\\b(?:my|the user'?s?) team is\\b"
      key: user:team
    - pattern: "(?i)\\b(?:I|the user) (?:use|prefer)s?\\s+.+?\\s+(?:as\\s+|for\\s+)?(?:my\\s+|their\\s+)?editor\\b"
      key: pref:editor
    - pattern: "(?i)\\b(?:I|the user) (?:use|prefer)s?\\s+.+?\\s+(?:theme|mode)\\b"
      key: pref:theme
    - pattern: "(?i)\\b(?:I|the user) (?:prefer|use)s?\\s+.+?\\s+(?:for|as)\\s+(?:my\\s+)?(?:primary\\s+)?(?:programming\\s+)?language\\b"
      key: pref:language
    - pattern: "(?i)\\b(?:we|the team) (?:decided|chose|agreed) to use .+? (?:for|as) (?:the\\s+|our\\s+)?(.+)$"
      key: null
  fact_query_rules:
    - pattern: "(?i)\\b(?:my|user) timezone\\b"
      key: user:timezone
    - pattern: "(?i)\\b(?:my|user) name\\b"
      key: user:name
    - pattern: "(?i)\\b(?:my|user) role\\b"
      key: user:role
    - pattern: "(?i)\\b(?:my|user) team\\b"
      key: user:team
    - pattern: "(?i)\\b(?:my|user) editor\\b"
      key: pref:editor
    - pattern: "(?i)\\b(?:my|user) theme\\b"
      key: pref:theme
    - pattern: "(?i)\\b(?:my|user) language\\b"
      key: pref:language
